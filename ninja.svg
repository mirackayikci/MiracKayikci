<svg xmlns="http://www.w3.org/2000/svg" width="900" height="380" viewBox="0 0 900 380">

<defs>
  <radialGradient id="bgGlow" cx="50%" cy="60%" r="55%">
    <stop offset="0%" stop-color="#1a0000"/>
    <stop offset="100%" stop-color="#050505"/>
  </radialGradient>

  <radialGradient id="fb1" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ffffc8"/>
    <stop offset="40%" stop-color="#ff7800" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#ff2800" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="fb2" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ffffa0"/>
    <stop offset="40%" stop-color="#ff5000" stop-opacity="0.85"/>
    <stop offset="100%" stop-color="#ff1000" stop-opacity="0"/>
  </radialGradient>

  <!-- Soft glow -->
  <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Strong glow for ninja + symbol -->
  <filter id="glowStrong" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="6" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Subtle glow for text -->
  <filter id="glowText" x="-20%" y="-40%" width="140%" height="180%">
    <feGaussianBlur stdDeviation="2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <clipPath id="clip"><rect width="900" height="380" rx="16"/></clipPath>
</defs>

<!-- BG -->
<rect width="900" height="380" fill="url(#bgGlow)" rx="16"/>

<!-- Subtle grid lines -->
<g stroke="#ff2200" stroke-width="0.3" opacity="0.06">
  <line x1="0" y1="50"  x2="900" y2="50"/>
  <line x1="0" y1="100" x2="900" y2="100"/>
  <line x1="0" y1="150" x2="900" y2="150"/>
  <line x1="0" y1="200" x2="900" y2="200"/>
  <line x1="0" y1="250" x2="900" y2="250"/>
  <line x1="0" y1="300" x2="900" y2="300"/>
  <line x1="0" y1="350" x2="900" y2="350"/>
  <line x1="150" y1="0" x2="150" y2="380"/>
  <line x1="300" y1="0" x2="300" y2="380"/>
  <line x1="450" y1="0" x2="450" y2="380"/>
  <line x1="600" y1="0" x2="600" y2="380"/>
  <line x1="750" y1="0" x2="750" y2="380"/>
</g>

<!-- Ground -->
<line x1="0" y1="318" x2="900" y2="318" stroke="#ff3300" stroke-width="0.8" opacity="0.35"/>
<rect x="0" y="310" width="900" height="70" fill="#ff1100" opacity="0.04"/>

<!-- ══════════════════════════════════════════ -->
<!--   EMBER PARTICLES                        -->
<!-- ══════════════════════════════════════════ -->
<g>
  <circle r="2" fill="#ff6000">
    <animate attributeName="cx" values="90;100;90" dur="3.1s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="318;30;318" dur="3.1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0" dur="3.1s" repeatCount="indefinite"/>
  </circle>
  <circle r="1.5" fill="#ff4500">
    <animate attributeName="cx" values="210;198;210" dur="2.4s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="cy" values="318;50;318" dur="2.4s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="2.4s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle r="2.5" fill="#ff7000">
    <animate attributeName="cx" values="370;358;370" dur="3.7s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="cy" values="318;18;318" dur="3.7s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="opacity" values="0;1;0" dur="3.7s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle r="2" fill="#ff5500">
    <animate attributeName="cx" values="530;545;530" dur="2.8s" repeatCount="indefinite" begin="1.5s"/>
    <animate attributeName="cy" values="318;38;318" dur="2.8s" repeatCount="indefinite" begin="1.5s"/>
    <animate attributeName="opacity" values="0;0.85;0" dur="2.8s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
  <circle r="1.8" fill="#ff8000">
    <animate attributeName="cx" values="670;682;670" dur="2.2s" repeatCount="indefinite" begin="0.8s"/>
    <animate attributeName="cy" values="318;65;318" dur="2.2s" repeatCount="indefinite" begin="0.8s"/>
    <animate attributeName="opacity" values="0;0.7;0" dur="2.2s" repeatCount="indefinite" begin="0.8s"/>
  </circle>
  <circle r="2" fill="#ff6500">
    <animate attributeName="cx" values="800;815;800" dur="3.3s" repeatCount="indefinite" begin="0.3s"/>
    <animate attributeName="cy" values="318;28;318" dur="3.3s" repeatCount="indefinite" begin="0.3s"/>
    <animate attributeName="opacity" values="0;0.9;0" dur="3.3s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
  <circle r="1.5" fill="#ff5000">
    <animate attributeName="cx" values="460;448;460" dur="4.1s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="cy" values="318;25;318" dur="4.1s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="opacity" values="0;0.75;0" dur="4.1s" repeatCount="indefinite" begin="2s"/>
  </circle>
  <circle r="2.2" fill="#ff7500">
    <animate attributeName="cx" values="740;728;740" dur="2.6s" repeatCount="indefinite" begin="0.6s"/>
    <animate attributeName="cy" values="318;42;318" dur="2.6s" repeatCount="indefinite" begin="0.6s"/>
    <animate attributeName="opacity" values="0;0.85;0" dur="2.6s" repeatCount="indefinite" begin="0.6s"/>
  </circle>
</g>

<!-- ══════════════════════════════════════════ -->
<!--   FIREBALLS                              -->
<!-- ══════════════════════════════════════════ -->
<g filter="url(#glow)">
  <circle r="12" fill="url(#fb1)">
    <animate attributeName="cx" values="-20;920;-20" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="95;112;95" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle r="22" fill="#ff4500" opacity="0.25">
    <animate attributeName="cx" values="-20;920;-20" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="95;112;95" dur="4s" repeatCount="indefinite"/>
  </circle>
  <ellipse rx="36" ry="7" fill="#ff3000" opacity="0.3">
    <animate attributeName="cx" values="-48;892;-48" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="95;112;95" dur="4s" repeatCount="indefinite"/>
  </ellipse>
</g>

<g filter="url(#glow)">
  <circle r="10" fill="url(#fb2)">
    <animate attributeName="cx" values="920;-20;920" dur="5.2s" repeatCount="indefinite" begin="1.5s"/>
    <animate attributeName="cy" values="220;205;220" dur="5.2s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
  <circle r="19" fill="#ff5500" opacity="0.25">
    <animate attributeName="cx" values="920;-20;920" dur="5.2s" repeatCount="indefinite" begin="1.5s"/>
    <animate attributeName="cy" values="220;205;220" dur="5.2s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
  <ellipse rx="30" ry="6" fill="#ff3500" opacity="0.28">
    <animate attributeName="cx" values="945;-5;945" dur="5.2s" repeatCount="indefinite" begin="1.5s"/>
    <animate attributeName="cy" values="220;205;220" dur="5.2s" repeatCount="indefinite" begin="1.5s"/>
  </ellipse>
</g>

<g filter="url(#glow)">
  <circle r="8" fill="url(#fb1)">
    <animate attributeName="cx" values="-20;920;-20" dur="7s" repeatCount="indefinite" begin="0.7s"/>
    <animate attributeName="cy" values="160;175;160" dur="7s" repeatCount="indefinite" begin="0.7s"/>
  </circle>
  <circle r="15" fill="#ff6000" opacity="0.22">
    <animate attributeName="cx" values="-20;920;-20" dur="7s" repeatCount="indefinite" begin="0.7s"/>
    <animate attributeName="cy" values="160;175;160" dur="7s" repeatCount="indefinite" begin="0.7s"/>
  </circle>
</g>

<!-- ══════════════════════════════════════════ -->
<!--   SPINNING SYMBOL  𖣘  (left side)        -->
<!-- ══════════════════════════════════════════ -->
<g filter="url(#glowStrong)">
  <text
    x="155" y="195"
    font-size="80"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="#ff2200"
    opacity="0.92">
    𖣘
    <animateTransform attributeName="transform" type="rotate"
      values="0 155 195;360 155 195"
      dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.92;0.5;0.92" dur="3s" repeatCount="indefinite"/>
  </text>
  <!-- Outer ring pulse -->
  <circle cx="155" cy="195" r="52" fill="none" stroke="#ff2200" stroke-width="1" opacity="0.3">
    <animate attributeName="r" values="52;62;52" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="155" cy="195" r="45" fill="none" stroke="#ff4400" stroke-width="0.5" opacity="0.2">
    <animate attributeName="r" values="45;35;45" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.4;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>
</g>

<!-- ══════════════════════════════════════════ -->
<!--   ASCII NINJA  (center-right, static)    -->
<!-- ══════════════════════════════════════════ -->
<!-- Ninja floats up and down gently, with a subtle glow -->
<g filter="url(#glowStrong)">
  <g>
    <!-- Gentle float -->
    <animateTransform attributeName="transform" type="translate"
      values="0,0;0,-8;0,0"
      dur="3s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>

    <g font-family="'Courier New', Courier, monospace" font-size="8.5" fill="#e8e8e8" letter-spacing="0">
      <!-- Each line of the ASCII art, centered around x=570 -->
      <text x="360" y="28">⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⢀⣀⣀⣀⣀⡀</text>
      <text x="360" y="38">⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⢀⣠⠤⠖⠒⠉⠁⠀⠀⠈⠙⢶⣄</text>
      <text x="360" y="48">⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⢀⡠⠞⠋⠁⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠉⠳⣄</text>
      <text x="360" y="58">⠀⠀⠀⠀⠀⠀⠀⠀⢀⡴⠋⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠘⢷⡄</text>
      <text x="360" y="68">⠀⠀⠀⠀⠀⠀⠀⠀⡏⠀⠀⢀⡠⠄⠂⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⢹⡄</text>
      <text x="360" y="78">⠀⠀⠀⠀⠀⠀⠀⠀⢹⡶⠍⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⢻⠇</text>
      <text x="360" y="88">⠀⠀⠀⠀⠀⠀⠀⠀⢸⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⣼⡄</text>
      <text x="360" y="98">⠀⠀⠀⠀⠀⠀⠀⠀⢸⣀⠀⠀⠀⠀⠀⠰⠖⠒⠒⠒⠂⠀⠀⠀⢀⣀⣶⢦⣴⣾⢻⡁</text>
      <text x="360" y="108">⠀⠀⠀⠀⠀⠀⠀⠀⠈⢿⠛⢿⡹⠟⣛⡿⣿⣿⠛⠛⠿⣿⡉⢉⣹⣿⣿⠸⣿⠇⢸⡇</text>
      <text x="360" y="118">⠀⠀⠀⠀⠀⠀⠀⠀⠀⠸⡆⠱⡟⢦⣙⠻⣿⣼⣤⣤⣴⣯⡡⠼⠿⠿⣿⣤⣯⢀⡞</text>
      <text x="360" y="128">⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⢻⡀⠈⠂⠈⠉⠙⠉⠉⠉⠁⠀⠀⠀⠀⣠⣟⡁⠈⢿⠀⠀⣀⠤⠤⢤⡀</text>
      <text x="360" y="138">⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠑⢤⡀⠀⠀⠀⠀⠀⠀⠀⠀⠀⢀⡶⠉⢻⣴⣶⢬⡶⠊⠀⠀⠀⠀⡈⠑⠦⣀</text>
      <text x="360" y="148">⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠉⠢⣄⡀⠀⠀⠀⠀⠀⣰⠏⢀⣠⢊⣿⡷⠶⣷⣀⣠⠤⠊⠉⠉⠉⠒⠂⠿⠶⢤⡀</text>
      <text x="360" y="158">⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⢠⡿⠶⠤⢄⣀⣤⣥⣶⣿⣮⣿⠿⣍⣛⣛⣿⠷⢄</text>
      <text x="360" y="168">⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⢀⣼⣿⡷⢶⣶⣾⢋⠞⣻⠁⠀⠈⠓⢶⣏⣉⡡⢾⠀⠀⠑⢤⣀⠀⠀⠀⠀⢀⣤⠤⠒</text>
      <text x="360" y="178">⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⣟⡹⠹⣍⠒⢋⡴⠋⠀⢱⡀⣀⣀⣀⣀⣷⣦⣶⠟⠒⠒⠒⠂⠀⠉⢉⡩⠟⠋</text>
      <text x="360" y="188">⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠹⡇⢀⡞⠛⠉⢀⠀⠀⠀⠙⣻⠀⠀⠉⠙⠫⢄⡀⠀⠀⢀⡠⠔⠊⠁</text>
      <text x="360" y="198">⣤⡤⣄⡀⠀⠀⠀⠀⠀⠀⠀⠀⠀⣼⠀⡞⠀⠀⠀⠈⠣⣀⠀⠀⡏⠀⠀⠀⠀⠀⠀⠈⠉⠉⠁</text>
      <text x="360" y="208">⠿⣿⣾⣿⣿⣶⣦⣤⣤⣀⠀⣴⣶⣿⣼⠁⠀⠀⠀⢀⠀⠈⠀⢠⡷</text>
      <text x="360" y="218">⠀⠀⠈⠉⠙⠛⠿⢿⣿⣿⣿⣿⡟⣿⣿⣤⣴⣶⣶⣾⣿⣿⢿⣿</text>
      <text x="360" y="228">⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⣿⣿⣷⣿⠏⢿⡿⡿⣄⠘⠉⠀⠀⠙⢦⡤⣀⣀</text>
      <text x="360" y="238">⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠈⠉⠉⡟⠀⡎⢻⣎⢢⡙⠢⣀⠀⠀⠀⠳⣤⣬⣍⣉⣙⣒⠒⠶⠤⠤⠤⠤⠤⠤⢤⡄</text>
      <text x="360" y="248">⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⣸⠀⠀⠙⠒⢿⣟⠻⡉⠉⠉⠉⠢⡀⡸⠉⠉⠙⠛⠛⠛⠛⠻⠧⠤⠤⠤⠒⠋⠁</text>
      <text x="360" y="258">⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠹⣄⡀⣀⣀⣼⠈⣆⠈⢲⣤⣤⠤⢿⠃</text>
      <text x="360" y="268">⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠈⡍⠉⢹⠃⠀⠈⠉⠉⠙⡄⠀⣨⣧</text>
      <text x="360" y="278">⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⣠⠗⠉⢺⡀⠀⠀⠀⠀⠀⢻⡏⠀⠀⠑⠢⣄</text>
      <text x="360" y="288">⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠸⢇⠀⢀⣸⠇⠀⠀⠀⠀⠀⠀⠉⠑⠂⠤⠶⠋</text>
    </g>

    <!-- Red eye glow on ninja face area (around y=108 where the face is) -->
    <g filter="url(#glow)">
      <circle cx="458" cy="103" r="2.5" fill="#ff0000" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="475" cy="103" r="2.5" fill="#ff0000" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite" begin="0.2s"/>
      </circle>
    </g>
  </g>
</g>

<!-- ══════════════════════════════════════════ -->
<!--   SHURIKENS                              -->
<!-- ══════════════════════════════════════════ -->
<g filter="url(#glow)">
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="850,200;-30,150;850,200"
      dur="4s" repeatCount="indefinite" begin="0.5s"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="0;-360" dur="0.7s" repeatCount="indefinite" additive="sum"/>
      <polygon points="0,-9 2.2,-2.2 9,0 2.2,2.2 0,9 -2.2,2.2 -9,0 -2.2,-2.2" fill="#cc1100" stroke="#ff4400" stroke-width="0.6"/>
      <circle cx="0" cy="0" r="2.5" fill="#ff5500"/>
    </g>
    <ellipse cx="14" cy="0" rx="12" ry="2.5" fill="#ff2200" opacity="0.2"/>
  </g>
</g>

<g filter="url(#glow)">
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="850,240;-30,190;850,240"
      dur="4s" repeatCount="indefinite" begin="2s"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="45;-315" dur="0.6s" repeatCount="indefinite" additive="sum"/>
      <polygon points="0,-8 2,-2 8,0 2,2 0,8 -2,2 -8,0 -2,-2" fill="#aa1100" stroke="#ff3300" stroke-width="0.5"/>
      <circle cx="0" cy="0" r="2" fill="#ff4400"/>
    </g>
    <ellipse cx="12" cy="0" rx="10" ry="2" fill="#ff1100" opacity="0.18"/>
  </g>
</g>

<!-- ══════════════════════════════════════════ -->
<!--   CORNER TAGS + TAGLINE                  -->
<!-- ══════════════════════════════════════════ -->
<text x="16" y="22" font-family="monospace" font-size="11" fill="#ff2200" opacity="0.6" filter="url(#glowText)">▶ ACTIVE</text>
<text x="884" y="22" font-family="monospace" font-size="11" fill="#ff2200" opacity="0.6" text-anchor="end" filter="url(#glowText)">SYS::ONLINE</text>
<text x="16" y="368" font-family="monospace" font-size="10" fill="#ff2200" opacity="0.4">mirackayikci</text>
<text x="884" y="368" font-family="monospace" font-size="10" fill="#ff2200" opacity="0.4" text-anchor="end">cybersec</text>

<text x="450" y="348" font-family="monospace" font-size="12" fill="#ff4500" text-anchor="middle" filter="url(#glowText)">
  [ stay silent. stay dangerous. ]
  <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
</text>

<!-- Pulsing border -->
<rect x="1.5" y="1.5" width="897" height="377" rx="15" fill="none" stroke="#ff2200" stroke-width="1.5">
  <animate attributeName="opacity" values="0.25;0.75;0.25" dur="3s" repeatCount="indefinite"/>
</rect>

</svg>
